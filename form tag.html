<!DOCTYPE html>
<html>

<head>
    <title>form page</title>
</head>

<body>
    <div align="center">
        <h2>company level tasks</h2>
        <hr>
        <table cellpadding="5" border="0" height="500" width="500">
            <tr>
                <form action="no action" method="post">

                    <td><b>Name:</b><input type="text" placeholder="Enter your Name" required></td>
            </tr>
            <tr>
                <td><b>DOB: </b><input type="date" required> </td>
            </tr>
            <tr>
                <td><b> Country Name: </b><select name="Country" id="country" required>
                        <option value="india">India</option>
                        <option value="UK">UK</option>
                        <option value="USA">USA</option>
                        <option value="Canada">Canada</option>
                        <option value="Australia">Australia</option>
                        <option value="Bhutan">Bhutan</option>
                        <option value="Iraq">Iraq</option>
                        <option value="Italy">Italy</option>
                        <option value="Germany">Germany</option>
                    </select>

                </td>
            </tr>

            <tr>
                <td> <b>Address : </b><textarea name="address" rows="4" cols="40" placeholder="Enter your Address"
                        required></textarea></td>
            </tr><br><br>
            <tr>
                <td><b> Gender:<b><input type="radio"><label for="Male">Male</label>
                            <input type="radio"><label for="Female">Female</label>
                            <input type="radio"><label for="other">other</label>
                        </b> </td>
            </tr>
            <tr>
                <td required><b>Tech Known:</b>
                    <input type="checkbox"><label for="Python"><b>Python</b></label>
                    <input type="checkbox"><label for="Data Analysis"><b>Data Analysis</b></label>
                    <input type="checkbox"><label for="HTML"><b>HTML</b></label>
            <tr>
                <td align="center"> <input type="checkbox"><label for="CSS"><b>CSS</b></label>
                    <input type="checkbox"><label for="JAVA"><b>JAVA</b></label>
                </td>
            </tr>
            </td>
            </tr>
            <td> <b>Any Message for us: </b><i>(optional)</i> <textarea name="address" rows="4" cols="50"
                    placeholder="Enter your Message" optional></textarea></td>
            </tr><br><br>

            <tr align="center">
                <td><button type="reset">
                        <b>reset</b>
                    </button></td>
            </tr>

            <tr align="center">
                <td><button type="Submit">
                        <b>Submit</b>
                    </button></td>
            </tr>



            </form>
        </table>

    </div>

</body>

</html>
